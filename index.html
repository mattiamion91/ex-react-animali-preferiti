<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <!--react-->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!--reactDom-->
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!--babel-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;
        //funzione modale

        function Modal({
            title,
            content,
            show = false,
            onClose = () => { },
            onConfirm = () => { },

        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        <p>{content}</p>
                        <div>
                            <button onClick={onClose}>Annulla</button>
                            <button onClick={onConfirm}>Conferma</button>
                        </div>
                    </div>
                </div>,
                document.body
            )
        }

        //script creazione componente react
        const ReactApp = () => {

            const [show, setShow] = useState(false);
            const [animals, setAnimals] = useState([]);
            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];
            const [text, setText] = useState('')
            const [isLoading, setIsLoading] = useState(false)

            async function addAnimals() {
                if (!text.trim()) return;
                setIsLoading(true)
                try {
                    const res = await fetch(`http://localhost:3333/animals?search=${text}`)
                    const [animalData] = await res.json()
                    if (!animalData) {
                        throw new Error('animale non trovato')
                    }
                    console.log(animal);
                    const animal = {
                        name: animalData.name || null,
                        description: animalData.description || null,
                        asd: animalData.image || null
                    }
                    setAnimals(curr => [...curr, animal])
                } catch (error) {
                    console.error(error);
                } finally {
                    setText('')
                    setShow(false)
                    setIsLoading(false)
                }


                //const randomIndex = Math.floor(Math.random() * animalsChoices.length);
                //const randomAnimal = animalsChoices[randomIndex];
                //setAnimals(curr => [...curr, randomAnimal])

            }

            return (
                <>
                    <h1>sono reactapp!</h1>
                    <button onClick={() => setShow(true)}>Aggiungi Animale</button>
                    <details>
                        <summary>Animali</summary>
                        <div>
                            {animals.map((a, i) => (
                                <div key={i} className="card">
                                    <div>
                                        <h3>{a.name}</h3>
                                        <p>{a.description}</p>
                                    </div>
                                    {a.image &&
                                    <figure>
                                        <img src={a.image} alt={a.name}/>
                                    </figure>}
                                </div>))}
                        </div>
                    </details>
                    <Modal
                        title="aggiungi animale"
                        content={<>
                            <input
                                type="text"
                                value={text}
                                onChange={e => setText(e.target.value)}
                            />
                            {isLoading && <p>caricamento...</p>}
                        </>}
                        show={show}
                        onConfirm={addAnimals}
                        onClose={() => setShow(false)}
                    />
                </>
            )

        }
    </script>

    <script type="text/babel">
        //script `montaggio nel dom
        const { createRoot } = ReactDOM;
        //seleziono div .lista-animali
        const listaAnimali = document.querySelector('.lista-animali')
        const root = createRoot(listaAnimali)
        root.render(<ReactApp />)
    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>

</body>

</html>
