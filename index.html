<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <!--react-->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!--reactDom-->
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!--babel-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        //script creazione componente react
        const ReactApp = () => {
            const {useState} = React;

            const [animals, setAnimals] = useState([]);
            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            function addAnimals() {
                const randomIndex = Math.floor(Math.random() * animalsChoices.length);
                const randomAnimal = animalsChoices[randomIndex];
                setAnimals(curr => [...curr, randomAnimal])

            }

            return (
                <>
                <h1>sono reactapp!</h1>
                <button onClick={addAnimals}>Aggiungi Animale</button>
                <details>
                    <summary>Animali</summary>
                    <ul>
                        {animals.map((a, i)=><li key={i}>{a}</li>)}
                    </ul>
                </details>
                </>
            )

        }
    </script>

    <script type="text/babel">
        //script `montaggio nel dom
        const { createRoot } = ReactDOM;
        //seleziono div .lista-animali
        const listaAnimali = document.querySelector('.lista-animali')
        const root = createRoot(listaAnimali)
        root.render(<ReactApp/>)
    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>

</body>

</html>
